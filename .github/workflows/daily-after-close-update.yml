name: Daily after-close market data update

on:
  workflow_dispatch:
  schedule:
    # Taiwan market data is updated after close. This runs at 17:30 Asia/Taipei.
    - cron: "30 9 * * 1-5"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update daily prices and scores
        run: node scripts/run-daily-after-close-update.mjs --write

      - name: Verify Supabase freshness
        run: node scripts/check-supabase-freshness.mjs

      - name: Verify Phase 1.1 core symbol freshness
        run: node scripts/check-phase-1-1-core-symbol-freshness.mjs
