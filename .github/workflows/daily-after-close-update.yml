name: Daily after-close market data update

on:
  workflow_dispatch:
    inputs:
      write_enabled:
        description: "Set true to write daily_prices/daily_scores. Leave false for a no-write observation run."
        required: false
        default: "false"
  schedule:
    # Observation run after Taiwan close. This runs at 15:30 Asia/Taipei and does not write.
    - cron: "30 7 * * 1-5"
    # Write run after Taiwan market data is expected to be complete. This runs at 17:30 Asia/Taipei.
    - cron: "30 9 * * 1-5"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update daily prices and scores
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 9 * * 1-5" ]; then
            node scripts/run-daily-after-close-update.mjs --write
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.write_enabled }}" = "true" ]; then
            node scripts/run-daily-after-close-update.mjs --write
          else
            node scripts/run-daily-after-close-update.mjs
          fi

      - name: Verify Supabase freshness
        run: node scripts/check-supabase-freshness.mjs

      - name: Verify Phase 1.1 core symbol freshness
        run: node scripts/check-phase-1-1-core-symbol-freshness.mjs

      - name: Report Phase 1.1 listed equity adjusted coverage
        run: node scripts/check-phase-1-1-listed-equity-coverage-rollup.mjs --report-only

      - name: Report Phase 1.1 listed equity metadata maintenance candidates
        run: node scripts/check-phase-1-1-listed-equity-metadata-maintenance-candidates.mjs
